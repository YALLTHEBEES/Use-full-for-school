<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Summarizer – local server + worker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📧 Email Summarizer</h1>
    <p class="subtitle">Powered by local TextRank (client‑side) or Python server (optional)</p>

    <textarea id="emailInput" rows="12" placeholder="Paste your email text here..."></textarea>

    <div class="controls">
      <label>
        <input type="checkbox" id="serverMode"> Use local Python server (advanced)
      </label>
      <span id="serverStatus" style="display:none; color:#2a9d8f;">Server mode active</span>
      <label>
        Ratio: <input type="range" id="ratioSlider" min="0.1" max="0.9" step="0.05" value="0.3">
        <span id="ratioValue">30%</span>
      </label>
    </div>

    <button id="summarizeBtn">Summarize</button>
    <div id="output" class="output"></div>
  </div>

  <script src="engine.js"></script>
  <script src="ui.js"></script>
</body>
</html>
