<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI School Help</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="app">

<h1>AI School Help</h1>

<textarea
id="memory"
placeholder="Paste notes here..."></textarea>

<textarea
id="question"
placeholder="Ask a question..."></textarea>

<button id="saveButton">
Save Notes
</button>

<button id="loadButton">
Load Notes
</button>

<button id="clearButton">
Clear
</button>

<button id="askButton">
Ask AI
</button>

<div id="status"></div>

<div id="output"></div>

</div>

<script src="storage.js"></script>
<script src="engine.js"></script>
<script src="ui.js"></script>

</body>
</html>
