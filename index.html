```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI School Help</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="app">

    <header>

        <h1>AI School Help</h1>

        <p>
            Local browser AI assistant
        </p>

    </header>

    <section class="panel">

        <label>
            Study Material
        </label>

        <textarea
        id="memory"
        placeholder="Paste notes, assignments, emails, or study material here..."></textarea>

        <div class="controls">

            <button id="saveButton">
                Save Notes
            </button>

            <button id="loadButton">
                Load Notes
            </button>

            <button id="clearButton">
                Clear
            </button>

        </div>

    </section>

    <section class="panel">

        <label>
            Ask Question
        </label>

        <textarea
        id="question"
        placeholder="Ask a question..."></textarea>

        <button id="askButton">
            Ask AI
        </button>

    </section>

    <section class="panel">

        <div id="status"></div>

        <div id="output"></div>

    </section>

</div>

<script src="storage.js"></script>
<script src="engine.js"></script>
<script src="ui.js"></script>

</body>
</html>
```
